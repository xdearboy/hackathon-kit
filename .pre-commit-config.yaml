repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
      - id: docstring-report
        name: docstring report
        entry: uv run python tools/docstring_report.py template/src
        language: system
        pass_filenames: false
        always_run: true
